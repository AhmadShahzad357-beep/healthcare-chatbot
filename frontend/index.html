<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>HealthCare Chatbot</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
        body { background:#f0f4f9; height:100vh; display:flex; overflow:hidden; }
        .sidebar { width:280px; min-width:280px; background:#1e293b; color:#e2e8f0; display:flex; flex-direction:column; height:100vh; padding:16px 14px; flex-shrink:0; border-right:1px solid #334155; overflow:hidden; }
        .sidebar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .sidebar-header h2 { font-size:18px; font-weight:600; color:#f1f5f9; }
        .sidebar-header .new-btn { background:#3b82f6; border:none; color:#fff; padding:8px 16px; border-radius:30px; font-weight:600; font-size:13px; cursor:pointer; }
        .sidebar-header .new-btn:hover { background:#2563eb; }
        .sidebar-header .history-btn { background:#475569; border:none; color:#fff; padding:8px 16px; border-radius:30px; font-weight:600; font-size:13px; cursor:pointer; margin-right:6px; }
        .sidebar-header .history-btn:hover { background:#334155; }
        .session-list { flex:1; overflow-y:auto; list-style:none; padding-right:4px; margin-top:4px; }
        .session-list::-webkit-scrollbar { width:4px; }
        .session-list::-webkit-scrollbar-thumb { background:#475569; border-radius:8px; }
        .session-list li { padding:10px 14px; margin-bottom:4px; border-radius:12px; cursor:pointer; font-size:14px; color:#cbd5e1; transition:0.15s; display:flex; justify-content:space-between; align-items:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border:1px solid transparent; }
        .session-list li:hover { background:#334155; color:#f1f5f9; }
        .session-list li.active { background:#3b82f6; color:#fff; font-weight:500; border-color:#3b82f6; }
        .sidebar-footer { margin-top:12px; padding-top:12px; border-top:1px solid #334155; font-size:11px; color:#64748b; display:flex; justify-content:space-between; }
        .sidebar-footer .patient-badge { background:#334155; padding:4px 12px; border-radius:30px; font-size:11px; color:#e2e8f0; }
        .chat-container { flex:1; display:flex; flex-direction:column; background:#fff; height:100vh; min-width:0; }
        .chat-header { background:#fff; padding:14px 28px; border-bottom:1px solid #e9eef3; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .chat-header .title { font-size:18px; font-weight:600; color:#0f172a; display:flex; align-items:center; gap:8px; }
        .chat-header .patient-selector { display:flex; align-items:center; gap:10px; }
        .chat-header .patient-selector select { padding:6px 14px; border-radius:30px; border:1.5px solid #e2e8f0; background:#fff; font-size:13px; font-weight:500; color:#0f172a; outline:none; cursor:pointer; }
        .chat-header .patient-selector select:focus { border-color:#3b82f6; }
        .chat-header .session-indicator { font-size:12px; color:#94a3b8; background:#f1f5f9; padding:4px 14px; border-radius:30px; font-weight:500; }
        .messages { flex:1; padding:24px 28px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; background:#fafcff; }
        .messages::-webkit-scrollbar { width:5px; }
        .messages::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:10px; }
        .message { max-width:78%; padding:14px 20px; border-radius:20px; font-size:15px; line-height:1.6; word-wrap:break-word; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
        .message.user { align-self:flex-end; background:#1a3a5c; color:#fff; border-bottom-right-radius:6px; }
        .message.bot { align-self:flex-start; background:#fff; color:#1e293b; border:1px solid #e9eef3; border-bottom-left-radius:6px; }
        .input-area { padding:16px 28px; background:#fff; border-top:1px solid #e9eef3; display:flex; gap:12px; flex-shrink:0; }
        .input-area input { flex:1; padding:12px 20px; border:2px solid #e2e8f0; border-radius:40px; outline:none; font-size:15px; background:#f8faff; }
        .input-area input:focus { border-color:#3b82f6; background:#fff; }
        .input-area input::placeholder { color:#94a3b8; }
        .input-area button { background:#1a3a5c; color:#fff; border:none; padding:0 30px; border-radius:40px; font-weight:600; font-size:15px; cursor:pointer; }
        .input-area button:hover { background:#0f2a44; }
        .input-area button:disabled { opacity:0.5; cursor:not-allowed; }
        .typing { color:#64748b; font-size:14px; padding:6px 16px; align-self:flex-start; }
        .footer { font-size:10px; color:#94a3b8; text-align:center; padding:8px 28px; background:#fafcff; border-top:1px solid #edf2f7; flex-shrink:0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>💬 Chats</h2>
            <div style="display:flex; gap:6px;">
                <button class="history-btn" id="historyBtn">📜 Recall</button>
                <button class="new-btn" id="newChatBtn">+ New</button>
            </div>
        </div>
        <ul class="session-list" id="sessionList"><li style="color:#64748b;text-align:center;padding:24px 0;">Loading chats...</li></ul>
        <div class="sidebar-footer"><span>🧠 Memory</span><span class="patient-badge" id="sidebarPatient">Patient: —</span></div>
    </div>
    <div class="chat-container">
        <div class="chat-header">
            <div class="title">🏥 HealthCare Bot</div>
            <div style="display:flex;align-items:center;gap:12px;">
                <span class="session-indicator" id="sessionBadge">New</span>
                <div class="patient-selector">
                    <label style="font-size:13px;font-weight:500;color:#475569;">👤</label>
                    <select id="patientSelect"><option>Loading...</option></select>
                </div>
            </div>
        </div>
        <div class="messages" id="messageBox"><div class="message bot">👋 Select a patient and ask your question.</div></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask about symptoms, medicines, or recall past..." />
            <button id="sendBtn">Send</button>
        </div>
        <div class="footer">✅ Cross-session memory enabled. Click <strong>📜 Recall</strong> to see past chats.</div>
    </div>
    <script>
        console.log("✅ FULL Frontend Loaded (Cross-session memory)");
        let currentSessionId = null;
        const msgBox = document.getElementById('messageBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const patientSelect = document.getElementById('patientSelect');
        const sessionList = document.getElementById('sessionList');
        const sessionBadge = document.getElementById('sessionBadge');
        const sidebarPatient = document.getElementById('sidebarPatient');
        const newChatBtn = document.getElementById('newChatBtn');
        const historyBtn = document.getElementById('historyBtn');

        // ===== LOAD PATIENTS =====
        async function loadPatients() {
            try {
                const res = await fetch('/patients');
                const data = await res.json();
                if (data.patients) {
                    patientSelect.innerHTML = '';
                    data.patients.forEach(p => {
                        const opt = document.createElement('option');
                        opt.value = p.id;
                        opt.textContent = `${p.name} (${p.age})`;
                        patientSelect.appendChild(opt);
                    });
                    patientSelect.value = 1;
                    sidebarPatient.textContent = `Patient: ${data.patients[0].name}`;
                    loadSessions();
                }
            } catch(e) { patientSelect.innerHTML = '<option>Error</option>'; console.error(e); }
        }

        // ===== LOAD SESSIONS =====
        async function loadSessions() {
            const pid = patientSelect.value || 1;
            try {
                const res = await fetch(`/sessions?patient_id=${pid}`);
                const data = await res.json();
                sessionList.innerHTML = '';
                if (data.sessions?.length > 0) {
                    data.sessions.forEach(s => {
                        const li = document.createElement('li');
                        li.textContent = s.title || 'New Chat';
                        li.dataset.id = s.id;
                        li.onclick = () => loadSession(s.id);
                        if (s.id === currentSessionId) li.classList.add('active');
                        sessionList.appendChild(li);
                    });
                    if (!currentSessionId) {
                        const first = data.sessions[0];
                        currentSessionId = first.id;
                        sessionBadge.textContent = `Session: ${first.id.substring(0,6)}`;
                    }
                } else {
                    sessionList.innerHTML = '<li style="color:#64748b;text-align:center;padding:20px 0;">No chats yet.</li>';
                    startNewChat();
                }
            } catch(e) { sessionList.innerHTML = '<li style="color:#ef4444;">Error</li>'; console.error(e); }
        }

        // ===== LOAD SESSION (with full history) =====
        async function loadSession(sessionId) {
            currentSessionId = sessionId;
            document.querySelectorAll('#sessionList li').forEach(li => {
                li.classList.remove('active');
                if (li.dataset.id === sessionId) li.classList.add('active');
            });
            sessionBadge.textContent = `Session: ${sessionId.substring(0,6)}`;
            try {
                const pid = parseInt(patientSelect.value) || 1;
                const res = await fetch(`/session_history/${sessionId}?patient_id=${pid}`);
                const data = await res.json();
                msgBox.innerHTML = '';
                if (data.history && data.history.length > 0) {
                    data.history.forEach(turn => {
                        if (turn.user) msgBox.innerHTML += `<div class="message user">${turn.user}</div>`;
                        if (turn.bot) msgBox.innerHTML += `<div class="message bot">${turn.bot}</div>`;
                    });
                } else {
                    msgBox.innerHTML = '<div class="message bot">📂 No messages in this chat yet.</div>';
                }
            } catch (e) {
                msgBox.innerHTML = '<div class="message bot">⚠️ Error loading history.</div>';
                console.error('History error:', e);
            }
            userInput.focus();
        }

        // ===== START NEW CHAT =====
        function startNewChat() {
            currentSessionId = null;
            sessionBadge.textContent = 'New';
            msgBox.innerHTML = '<div class="message bot">✨ New chat started.</div>';
            userInput.value = '';
            userInput.focus();
        }

        // ===== 🆕 RECALL PAST (Cross-session history) =====
        async function recallPast() {
            const pid = parseInt(patientSelect.value) || 1;
            const days = 30;
            const limit = 30;
            msgBox.innerHTML = '<div class="message bot">📜 Fetching past conversations from last 30 days...</div>';
            try {
                const res = await fetch(`/global_history?patient_id=${pid}&days=${days}&limit=${limit}`);
                const data = await res.json();
                msgBox.innerHTML = '';
                if (data.history && data.history.length > 0) {
                    msgBox.innerHTML += `<div class="message bot">📜 <b>Past ${data.history.length} conversations from last ${days} days:</b></div>`;
                    data.history.forEach(msg => {
                        const sessionShort = msg.session ? msg.session.substring(0,6) : 'unknown';
                        msgBox.innerHTML += `<div class="message bot">[${sessionShort}] ${msg.time}: <br/><b>User:</b> ${msg.user}<br/><b>Bot:</b> ${msg.bot}</div>`;
                    });
                } else {
                    msgBox.innerHTML = '<div class="message bot">📜 No past conversations found in the last 30 days.</div>';
                }
            } catch (e) {
                msgBox.innerHTML = `<div class="message bot">⚠️ Error fetching history: ${e.message}</div>`;
                console.error('Recall error:', e);
            }
            userInput.focus();
        }

        // ===== SEND MESSAGE =====
        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;
            const pid = parseInt(patientSelect.value) || 1;

            msgBox.innerHTML += `<div class="message user">${query}</div>`;
            userInput.value = '';
            msgBox.scrollTop = msgBox.scrollHeight;
            sendBtn.disabled = true;

            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'Thinking...';
            msgBox.appendChild(typing);

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        patient_id: pid,
                        session_id: currentSessionId
                    })
                });
                if (!res.ok) {
                    const err = await res.text();
                    throw new Error(`Server ${res.status}: ${err}`);
                }
                const data = await res.json();
                msgBox.removeChild(typing);
                if (data.session_id && !currentSessionId) {
                    currentSessionId = data.session_id;
                    sessionBadge.textContent = `Session: ${currentSessionId.substring(0,6)}`;
                    loadSessions();
                }
                const bot = document.createElement('div');
                bot.className = 'message bot';
                bot.textContent = data.response || 'No response.';
                msgBox.appendChild(bot);
            } catch (e) {
                msgBox.removeChild(typing);
                msgBox.innerHTML += `<div class="message bot">⚠️ Error: ${e.message}</div>`;
                console.error('Fetch error:', e);
            }
            msgBox.scrollTop = msgBox.scrollHeight;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // ===== EVENT LISTENERS =====
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        patientSelect.addEventListener('change', () => { currentSessionId = null; sessionBadge.textContent = 'New'; loadSessions(); });
        newChatBtn.addEventListener('click', startNewChat);
        historyBtn.addEventListener('click', recallPast);

        // ===== INIT =====
        loadPatients();
        userInput.focus();
    </script>
</body>
</html>
